name: Morning OS — Daily Briefing

on:
  # Runs at 01:30 UTC = 05:30 Dubai time (UTC+4) every day
  schedule:
    - cron: '30 1 * * *'

  # Also allows manual trigger from GitHub UI (for testing)
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Install yt-dlp for podcast transcripts
        run: |
          sudo wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install Python dependencies for transcript processing
        run: |
          pip install --quiet webvtt-py 2>/dev/null || true

      - name: Fetch podcast transcripts
        run: node scripts/fetch-transcripts.js
        env:
          ACTIVE_PODCASTS: ${{ vars.ACTIVE_PODCASTS }}
        continue-on-error: true  # Don't fail briefing if podcasts fail

      - name: Generate Morning OS briefing
        run: node scripts/generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ACTIVE_NEWSLETTERS: ${{ vars.ACTIVE_NEWSLETTERS }}
          ACTIVE_PODCASTS: ${{ vars.ACTIVE_PODCASTS }}
          DEBUG: ${{ inputs.debug || 'false' }}

      - name: Upload logs as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-os-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
