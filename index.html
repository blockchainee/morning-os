<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morning OS">
<title>Morning OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Morning OS — clean Apple-quality light mode */
  --bg:        #F5F5F0;
  --bg2:       #FFFFFF;
  --bg3:       #EDEDEA;
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.12);
  --text:      #111113;
  --text2:     #52525C;
  --text3:     #96969F;
  --accent:    #0E8F62;
  --accent-bg: #E6F5EF;
  --accent2:   #4340A8;
  --accent2-bg:#ECEAFE;
  --amber:     #B8720F;
  --amber-bg:  #FDF2E0;
  --blue:      #1558A0;
  --blue-bg:   #E4EEF9;
  --red:       #B52C2C;
  --red-bg:    #FCEAEA;
  --font-serif:'Instrument Serif', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --r:         12px;
  --r-sm:      8px;
  --r-lg:      16px;
  --sheet-z:   100;
  color-scheme: light;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── APP SHELL ──────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── STATUS BAR ─────────────────────────────────────────────── */
#status-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.sb-left { display: flex; flex-direction: column; gap: 2px; }
.sb-date { font-family: var(--font-serif); font-size: 19px; color: var(--text); letter-spacing: -.2px; }
.sb-time { font-size: 11px; color: var(--text3); letter-spacing: .3px; font-weight: 500; }
.sb-right { display: flex; gap: 8px; align-items: center; }

#gen-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 8px 18px;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
  letter-spacing: .1px;
  box-shadow: 0 1px 3px rgba(14,143,98,.25);
}
#gen-btn:active { opacity: .8; transform: scale(.97); }
#gen-btn:disabled { opacity: .5; cursor: not-allowed; }

#settings-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  transition: background .15s;
}
#settings-btn:active { background: var(--bg3); }

/* ── META PILLS ─────────────────────────────────────────────── */
#meta-strip {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.mpill {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
  border: 1px solid transparent;
  white-space: nowrap;
}
.mp-bday  { background: var(--amber-bg);  color: var(--amber); border-color: var(--amber); }
.mp-mtg   { background: var(--blue-bg);   color: var(--blue);  border-color: var(--blue); }
.mp-focus { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.mp-gen   { background: var(--bg3); color: var(--text3); }

/* ── TAB CONTENT ────────────────────────────────────────────── */
#tab-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#tab-content::-webkit-scrollbar { display: none; }

/* ── TAB BAR ────────────────────────────────────────────────── */
#tab-bar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -1px 0 rgba(0,0,0,.04);
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 8px 0 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  transition: color .15s;
}
.tab-btn.active { color: var(--accent); }
.tab-indicator {
  width: 18px; height: 3px;
  border-radius: 2px;
  background: var(--border);
  transition: background .15s;
}
.tab-btn.active .tab-indicator { background: var(--accent); }

/* ── SECTION LABEL ──────────────────────────────────────────── */
.sec-lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .8px;
  padding: 4px 2px 2px;
  flex-shrink: 0;
}

/* ── BASE CARD ──────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
  flex-shrink: 0;
}
.card, .newsletter-card, .podcast-card, .grow-card {
  overflow-wrap: break-word;
  word-break: break-word;
  flex-shrink: 0;
}
.card:active { border-color: var(--border2); }

/* ── CALENDAR CARD ──────────────────────────────────────────── */
.bday-banner {
  background: var(--amber-bg);
  border-bottom: 1px solid var(--amber);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.bday-avatar {
  width: 28px; height: 28px;
  background: var(--amber);
  color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.bday-info { flex: 1; }
.bday-name { font-size: 12px; font-weight: 600; color: var(--amber); }
.bday-sub  { font-size: 10px; color: var(--text2); margin-top: 1px; }

.cal-item {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.cal-item:last-child { border-bottom: none; }
.cal-time {
  font-size: 10px;
  color: var(--text3);
  width: 36px;
  flex-shrink: 0;
  padding-top: 2px;
  font-variant-numeric: tabular-nums;
  line-height: 1.4;
}
.cal-body { flex: 1; }
.cal-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; }
.cal-sub   { font-size: 11px; color: var(--text2); margin-top: 1px; line-height: 1.3; }
.cal-prep  { font-size: 11px; color: var(--amber); margin-top: 2px; line-height: 1.3; }
.cal-focus { font-size: 11px; color: var(--accent); margin-top: 1px; }

/* ── NEWSLETTER CARD ────────────────────────────────────────── */
.ncard-header {
  padding: 12px 14px 10px;
  cursor: pointer;
  user-select: none;
}
.ncard-top {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}
.ncard-source {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.domain-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: .2px;
}
.d1 { background: var(--accent2-bg); color: var(--accent2); }
.d2 { background: var(--accent-bg);  color: var(--accent); }
.d3 { background: var(--blue-bg);    color: var(--blue); }
.d4 { background: var(--amber-bg);   color: var(--amber); }

.ncard-summary {
  font-size: 12px;
  line-height: 1.55;
  color: var(--text);
  margin-bottom: 6px;
}
.signal-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.sig-chip {
  font-size: 11px;
  line-height: 1.5;
  padding: 4px 9px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
}
.ncard-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.triage-row { display: flex; gap: 4px; }
.tq {
  font-size: 10px;
  padding: 3px 7px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text3);
  background: none;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.tq:active { transform: scale(.95); }
.tq.t-act  { background: var(--accent);  color: #fff; border-color: var(--accent); }
.tq.t-save { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.tq.t-share{ background: var(--blue);    color: #fff; border-color: var(--blue); }
.tq.t-done { background: var(--bg3);     color: var(--text3); border-color: var(--border); }
.deep-btn {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-sans);
  padding: 4px 10px;
}
.no-edition {
  padding: 6px 12px 10px;
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
}
/* Stale card (previously generated, not fresh today) */
.card.stale {
  opacity: 0.65;
  border-style: dashed;
}
.card.stale:hover, .card.stale:active { opacity: 0.85; }
.stale-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 2px 8px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── LAYER 2 PANEL ──────────────────────────────────────────── */
.layer2-panel {
  border-top: 1px solid var(--accent);
  background: color-mix(in srgb, var(--accent-bg) 60%, var(--bg2));
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
}
.layer2-panel.open { max-height: 5000px; }
.layer2-inner { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }

.l2-block { display: flex; flex-direction: column; gap: 3px; }
.l2-lbl {
  font-size: 9px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .7px;
}
.l2-text {
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
}
.l2-data {
  font-size: 11px;
  line-height: 1.6;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
  background: var(--bg3);
  border-radius: var(--r-sm);
  padding: 6px 8px;
}
.l2-implications {
  font-size: 12px;
  line-height: 1.6;
  color: var(--accent);
}
.reflect-box {
  background: var(--accent2-bg);
  border-left: 3px solid var(--accent2);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 8px 10px;
  font-size: 12px;
  line-height: 1.55;
  color: var(--accent2);
  font-style: italic;
}
.l2-actions { display: flex; gap: 6px; margin-top: 2px; }
.l2-action {
  flex: 1;
  padding: 8px;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: none;
  font-family: var(--font-sans);
  transition: opacity .15s;
}
.l2-action:active { opacity: .75; }
.act-thesis { background: var(--accent-bg); color: var(--accent); }
.act-deeper { background: var(--accent2-bg); color: var(--accent2); }

/* divider inside l2 */
.l2-div { height: 1px; background: var(--border); }

/* ── PODCAST CARD ───────────────────────────────────────────── */
.pcard-header {
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.pcard-art {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  color: var(--text3);
  flex-shrink: 0;
  overflow: hidden;
}
.pcard-art img { width: 100%; height: 100%; object-fit: cover; }
.pcard-meta { flex: 1; min-width: 0; }
.pcard-name { font-size: 13px; font-weight: 600; color: var(--text); }
.pcard-ep   { font-size: 10px; color: var(--text3); margin-top: 1px; }
.pcard-sum  { font-size: 12px; line-height: 1.5; color: var(--text2); margin-top: 4px; }
.pcard-footer {
  padding: 0 12px 9px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.p-deep-btn {
  font-size: 11px; font-weight: 600;
  color: var(--blue); background: none; border: none;
  cursor: pointer; font-family: var(--font-sans);
}

/* podcast layer 2 */
.pl2-panel {
  border-top: 1px solid var(--blue);
  background: color-mix(in srgb, var(--blue-bg) 50%, var(--bg2));
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
}
.pl2-panel.open { max-height: 5000px; }
.pl2-inner { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 10px; }

.pl2-section { display: flex; flex-direction: column; gap: 5px; }
.pl2-sec-lbl {
  font-size: 9px; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: .7px;
  display: flex; align-items: center; gap: 6px;
}
.pl2-topic-tag {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px;
  background: var(--blue-bg); color: var(--blue);
  margin-bottom: 3px;
}
.pl2-insight {
  font-size: 12px; line-height: 1.6; color: var(--text);
  padding-left: 10px;
  border-left: 2px solid var(--blue);
  margin-bottom: 4px;
}
.pl2-quote {
  font-size: 12px; line-height: 1.6;
  color: var(--text2); font-style: italic;
  background: var(--bg3); border-radius: var(--r-sm);
  padding: 8px 10px;
  position: relative;
}
.pl2-quote::before {
  content: '"';
  font-family: var(--font-serif);
  font-size: 28px; color: var(--border2);
  position: absolute; top: 2px; left: 6px;
  line-height: 1;
}
.pl2-quote-text { padding-left: 16px; }
.pl2-quote-attr { font-size: 10px; color: var(--text3); margin-top: 4px; font-style: normal; padding-left: 16px; }

.pl2-rec-item {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.pl2-rec-item:last-child { border-bottom: none; }
.rec-type {
  font-size: 9px; font-weight: 600; padding: 2px 6px;
  border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.rt-app    { background: var(--accent-bg); color: var(--accent); }
.rt-pod    { background: var(--blue-bg); color: var(--blue); }
.rt-book   { background: var(--amber-bg); color: var(--amber); }
.rt-source { background: var(--bg3); color: var(--text2); }
.rec-text { font-size: 11px; color: var(--text); line-height: 1.4; }

/* ── GROW TAB ───────────────────────────────────────────────── */
.grow-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  border-left: 3px solid var(--amber);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 5px;
  flex-shrink: 0;
}
.grow-lbl {
  font-size: 9px; font-weight: 700;
  color: var(--amber); text-transform: uppercase; letter-spacing: .7px;
}
.grow-body { font-size: 12px; line-height: 1.6; color: var(--text); }
.grow-body em { color: var(--text2); font-style: italic; }
.grow-arabic {
  font-size: 22px; font-family: 'Instrument Serif', serif;
  color: var(--text); margin-bottom: 2px;
}
.grow-transliteration { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }

/* ── SAVED TAB ──────────────────────────────────────────────── */
.saved-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
}
.saved-source { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
.saved-text   { font-size: 12px; line-height: 1.5; color: var(--text); }
.saved-date   { font-size: 10px; color: var(--text3); margin-top: 4px; }
.empty-state  {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px;
  color: var(--text3); font-size: 13px; text-align: center; gap: 8px;
}
.empty-icon { font-size: 32px; opacity: .4; }

/* ── SETTINGS PANEL ─────────────────────────────────────────── */
#settings-panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 88%;
  background: var(--bg2);
  border-left: 1px solid var(--border2);
  z-index: var(--sheet-z);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
#settings-panel.open { transform: translateX(0); }
#settings-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: calc(var(--sheet-z) - 1);
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#settings-overlay.open { opacity: 1; pointer-events: all; }

.settings-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg2);
  position: sticky; top: 0; z-index: 1;
}
.settings-title { font-size: 16px; font-weight: 600; }
.settings-close {
  background: none; border: none; color: var(--text2);
  font-size: 20px; cursor: pointer; padding: 4px;
  font-family: var(--font-sans);
}

.settings-section { padding: 16px; border-bottom: 1px solid var(--border); }
.settings-sec-lbl {
  font-size: 11px; font-weight: 700;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: .7px; margin-bottom: 10px;
}
.settings-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.settings-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.settings-input {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 9px 11px;
  font-size: 13px; color: var(--text); font-family: var(--font-sans);
  width: 100%;
  outline: none;
  transition: border-color .15s;
}
.settings-input:focus { border-color: var(--accent); }
.settings-input::placeholder { color: var(--text3); }

.podcast-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.podcast-item:last-child { border-bottom: none; }
.podcast-toggle {
  width: 36px; height: 22px;
  background: var(--border2); border-radius: 11px;
  position: relative; cursor: pointer;
  transition: background .2s; flex-shrink: 0; border: none;
}
.podcast-toggle.on { background: var(--accent); }
.podcast-toggle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  background: #fff; border-radius: 50%;
  transition: transform .2s;
}
.podcast-toggle.on::after { transform: translateX(14px); }
.podcast-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 500; }
.podcast-del {
  background: none; border: none; color: var(--text3);
  font-size: 18px; cursor: pointer; padding: 2px 6px;
  transition: color .15s;
}
.podcast-del:active { color: var(--red); }

.add-podcast-row { display: flex; gap: 8px; margin-top: 10px; }
.add-podcast-input {
  flex: 1;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 8px 10px;
  font-size: 13px; color: var(--text); font-family: var(--font-sans);
  outline: none;
}
.add-podcast-input:focus { border-color: var(--accent); }
.add-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  padding: 8px 14px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font-sans);
  transition: opacity .15s;
}
.add-btn:active { opacity: .8; }
.save-settings-btn {
  margin: 16px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r); padding: 12px;
  font-size: 14px; font-weight: 600; width: calc(100% - 32px);
  cursor: pointer; font-family: var(--font-sans);
}

/* ── PROGRESS INDICATOR ─────────────────────────────────────── */
#gen-progress {
  display: none;
  padding: 8px 12px;
  background: var(--accent-bg);
  border-bottom: 1px solid var(--accent);
  flex-shrink: 0;
}
#gen-progress.show { display: block; }
.prog-label { font-size: 11px; color: var(--accent); margin-bottom: 5px; font-weight: 500; }
.prog-bar-bg {
  height: 3px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
.prog-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px;
  transition: width .4s ease;
}
.prog-sources {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px;
}
.prog-chip {
  font-size: 9px; padding: 2px 6px;
  border-radius: 4px; font-weight: 500;
}
.pc-pending { background: var(--bg3); color: var(--text3); }
.pc-loading { background: var(--amber-bg); color: var(--amber); }
.pc-done    { background: var(--accent-bg); color: var(--accent); }
.pc-error   { background: var(--red-bg); color: var(--red); }

/* ── ANIMATIONS ─────────────────────────────────────────────── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-enter { animation: fadeSlideIn .3s ease forwards; }

/* ── TOAST NOTIFICATION ────────────────────────────────────── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 9999;
  pointer-events: none;
}
.toast.visible { opacity: 1; }

/* ── LOADING SKELETON ───────────────────────────────────────── */
.skeleton {
  background: var(--bg3);
  border-radius: 4px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0%,100% { opacity: .6; }
  50%      { opacity: 1; }
}
@keyframes pulse {
  0%,100% { opacity: .3; }
  50%      { opacity: .6; }
}

/* ── INTELLIGENCE CHAT DRAWER ──────────────────────────────── */
.drawer {
  position: fixed;
  bottom: 0; right: 0;
  width: 100%; max-width: 480px;
  height: 70vh;
  background: var(--bg2);
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 40px rgba(0,0,0,0.15);
  display: flex; flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 1000;
  overflow: hidden;
}
.drawer.closed { transform: translateY(100%); }
.drawer-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.drawer-backdrop.visible { opacity: 1; pointer-events: all; }
.drawer-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}
.drawer-title {
  font-weight: 600; font-size: 15px; color: var(--text);
  letter-spacing: 0.02em;
}
.drawer-close {
  background: none; border: none; color: var(--text3);
  font-size: 18px; cursor: pointer; padding: 4px 8px;
}
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg { max-width: 85%; line-height: 1.5; font-size: 13px; }
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent); color: #fff;
  padding: 10px 14px; border-radius: 16px 16px 4px 16px;
}
.chat-msg.assistant {
  align-self: flex-start;
  background: var(--bg3); color: var(--text);
  padding: 10px 14px; border-radius: 16px 16px 16px 4px;
  white-space: pre-wrap;
}
.chat-msg.thinking { opacity: 0.5; font-style: italic; }
.chat-input-row {
  display: flex; gap: 8px; padding: 10px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}
#chat-input {
  flex: 1; background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px; color: var(--text);
  padding: 10px 14px; font-size: 13px; resize: none;
  font-family: var(--font-sans); line-height: 1.4;
}
#chat-input:focus { outline: none; border-color: var(--accent); }
#chat-input::placeholder { color: var(--text3); }
#chat-send {
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  width: 40px; height: 40px; font-size: 18px;
  cursor: pointer; flex-shrink: 0; align-self: flex-end;
  font-family: var(--font-sans);
}
#chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
.ask-claude-btn {
  background: none; border: 1px solid var(--border2);
  color: var(--accent); border-radius: 8px;
  padding: 4px 10px; font-size: 11px; cursor: pointer;
  font-family: var(--font-sans); font-weight: 500;
  opacity: 0.8; transition: opacity 0.2s;
  margin-top: 6px;
}
.ask-claude-btn:hover, .ask-claude-btn:active { opacity: 1; }
#intelligence-btn {
  position: fixed; bottom: 72px; right: 16px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 24px;
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 16px rgba(14,143,98,0.35);
  z-index: 998; letter-spacing: 0.02em;
  font-family: var(--font-sans);
}
</style>
</head>
<body>
<div id="app">

  <!-- STATUS BAR -->

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
// ── Curated Podcast Directory ──────────────────────────────────
// Verified YouTube channels — prevents wrong transcripts from typos
const PODCAST_DIRECTORY = [
  { id:'bankless',       name:'Bankless',                  channel:'@Bankless',           domain:'D2', desc:'Crypto, DeFi, Ethereum' },
  { id:'lex-fridman',    name:'Lex Fridman Podcast',       channel:'@lexfridman',         domain:'D1', desc:'AI, science, geopolitics' },
  { id:'my-first-million', name:'My First Million',        channel:'@MyFirstMillionPod',  domain:'D2', desc:'Business, entrepreneurship' },
  { id:'knowledge-project', name:'The Knowledge Project',  channel:'@ShaneAParrish',      domain:'D1', desc:'Mental models, decisions' },
  { id:'tim-ferriss',    name:'The Tim Ferriss Show',      channel:'@TimFerriss',         domain:'D4', desc:'High performance, life design' },
  { id:'all-in',         name:'All-In Podcast',            channel:'@allinpodcast',       domain:'D2', desc:'Tech, investing, macro' },
  { id:'huberman',       name:'Huberman Lab',              channel:'@hubermanlab',        domain:'D4', desc:'Neuroscience, health, performance' },
  { id:'invest-like-best', name:'Invest Like the Best',    channel:'@InvestLiketheBest',  domain:'D2', desc:'Investing, capital allocation' },
  { id:'acquired',       name:'Acquired',                  channel:'@acquiredfm',         domain:'D1', desc:'Deep dives on great companies' },
  { id:'diary-of-ceo',   name:'The Diary of a CEO',        channel:'@TheDiaryOfACEO',     domain:'D4', desc:'Entrepreneurship, psychology' },
];

// ── Static briefing loader ────────────────────────────────────
// The GitHub Actions backend generates briefing.json daily.
// The app fetches it as a static file — no CORS, no API keys needed.

async function fetchStaticBriefing() {
  try {
    const resp = await fetch('briefing.json?t=' + Date.now());
    if (!resp.ok) { console.warn('briefing.json not found:', resp.status); return null; }
    const data = await resp.json();
    if (!data || !data.generated_at) return null;
    data._source = 'static';
    return data;
  } catch(e) { console.warn('Static briefing fetch error:', e); return null; }
}

const STATE = {
  tab: 'today',
  briefing: null,
  savedItems: [],
  newsletters: [
    { id:'bankless',              name:'Bankless',            sender:'@bankless.com',               on:true },
    { id:'the-pomp-letter',      name:'The Pomp Letter',     sender:'pomp@pomp.com',               on:true },
    { id:'tldr',                  name:'TLDR',                sender:'@tldr.tech',                  on:true },
    { id:'semafor-flagship',     name:'Semafor',             sender:'@semafor.com',                on:true },
    { id:'international-intrigue', name:'Intl Intrigue',     sender:'@internationalintrigue.io',   on:true },
    { id:'lark-davis',           name:'Lark Davis',          sender:'@larkdavis.com',              on:true },
    { id:'a16z',                  name:'a16z',               sender:'@a16z.com',                   on:true },
    { id:'lenny',                 name:"Lenny's Newsletter", sender:'lennys-newsletter substack',  on:true },
    { id:'chamath',               name:'Chamath',            sender:'chamath@socialcapital.com',   on:true },
    { id:'timeout',               name:'Time Out Dubai',     sender:'@timeout.com',               on:true },
  ],
  podcasts: [
    { id:'bankless-pod', name:'Bankless Podcast',       on:true },
    { id:'lex',          name:'Lex Fridman Podcast',    on:true },
    { id:'mfm',          name:'My First Million',       on:true },
    { id:'knowledge',    name:'The Knowledge Project',  on:true },
    { id:'tim',          name:'The Tim Ferriss Show',   on:false },
  ],
};

// ═══════════════════════════════════════════════════════════════
// TOAST NOTIFICATION
// ═══════════════════════════════════════════════════════════════
function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.classList.add('visible'), 10);
  setTimeout(() => { toast.classList.remove('visible'); setTimeout(() => toast.remove(), 300); }, 2500);
}

function removeSavedItem(index) {
  STATE.savedItems.splice(index, 1);
  localStorage.setItem('pig_os_saved', JSON.stringify(STATE.savedItems));
  const content = document.getElementById('tab-content');
  content.innerHTML = '';
  renderSaved(content);
  showToast('Removed');
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function save() {
  try {
    localStorage.setItem('pig_os_briefing',   JSON.stringify(STATE.briefing));
    localStorage.setItem('pig_os_saved',      JSON.stringify(STATE.savedItems));
    localStorage.setItem('pig_os_newsletters',JSON.stringify(STATE.newsletters));
    localStorage.setItem('pig_os_podcasts',   JSON.stringify(STATE.podcasts));
  } catch(e) {}
}
// Migrate old newsletter IDs to match backend IDs
const NL_ID_ALIASES = { pomp:'the-pomp-letter', semafor:'semafor-flagship', intrigue:'international-intrigue' };
function migrateNlId(id) { return NL_ID_ALIASES[id] || id; }

function load() {
  try {
    STATE.briefing    = JSON.parse(localStorage.getItem('pig_os_briefing') || 'null');
    STATE.savedItems  = JSON.parse(localStorage.getItem('pig_os_saved')    || '[]');
    const nl = localStorage.getItem('pig_os_newsletters');
    if (nl) {
      const loaded = JSON.parse(nl).map(n => ({ ...n, id: migrateNlId(n.id) }));
      // Add any new default newsletters not present in saved data
      const loadedIds = new Set(loaded.map(n => n.id));
      const defaultIds = ['bankless','the-pomp-letter','tldr','semafor-flagship','international-intrigue','lark-davis','a16z','lenny','chamath','timeout'];
      const defaultNls = [
        { id:'bankless', name:'Bankless', on:true }, { id:'the-pomp-letter', name:'The Pomp Letter', on:true },
        { id:'tldr', name:'TLDR', on:true }, { id:'semafor-flagship', name:'Semafor', on:true },
        { id:'international-intrigue', name:'Intl Intrigue', on:true }, { id:'lark-davis', name:'Lark Davis', on:true },
        { id:'a16z', name:'a16z', on:true }, { id:'lenny', name:"Lenny's Newsletter", on:true },
        { id:'chamath', name:'Chamath', on:true }, { id:'timeout', name:'Time Out Dubai', on:true },
      ];
      defaultNls.forEach(d => { if (!loadedIds.has(d.id)) loaded.push(d); });
      STATE.newsletters = loaded;
    }
    const pc = localStorage.getItem('pig_os_podcasts');
    if (pc) STATE.podcasts = JSON.parse(pc);
  } catch(e) {}
}

// ── Newsletter caching: always one card per source ──────────
function mergeAndCacheNewsletters() {
  const b = STATE.briefing;
  if (!b) return;
  const cached = JSON.parse(localStorage.getItem('pig_os_cached_nl') || '{}'); // id -> data
  const freshNls = b.newsletters || [];

  // Build a map of fresh newsletters that have actual content
  const freshMap = {};
  freshNls.forEach(n => {
    if (n.has_new_edition && n.layer1) {
      freshMap[n.id] = n;
      // Cache this fresh edition for future use
      cached[n.id] = { ...n, _cachedAt: new Date().toISOString() };
    }
  });

  // For each newsletter in briefing, if no fresh edition, substitute cached
  b.newsletters = freshNls.map(n => {
    if (n.has_new_edition && n.layer1) {
      return { ...n, _stale: false };
    }
    // Has layer1 data but not marked as new edition — show as previous edition
    if (n.layer1) {
      cached[n.id] = cached[n.id] || { ...n, _cachedAt: new Date().toISOString() };
      return { ...n, _stale: true, has_new_edition: true };
    }
    // Try cached version
    if (cached[n.id] && cached[n.id].layer1) {
      return { ...cached[n.id], _stale: true, has_new_edition: true };
    }
    return n; // no cache available either, will show "no edition"
  });

  localStorage.setItem('pig_os_cached_nl', JSON.stringify(cached));
}

// ═══════════════════════════════════════════════════════════════
// TIME & DATE
// ═══════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Dubai' }));
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('sb-date').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  document.getElementById('sb-time').textContent =
    `Dubai · ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
setInterval(updateClock, 30000);
updateClock();

// ═══════════════════════════════════════════════════════════════
// META PILLS
// ═══════════════════════════════════════════════════════════════
function renderMetaPills(cal, birthdays) {
  const strip = document.getElementById('meta-strip');
  strip.innerHTML = '';
  if (birthdays && birthdays.length) {
    birthdays.forEach(b => {
      const p = document.createElement('span');
      p.className = 'mpill mp-bday';
      p.textContent = `🎂 ${b.name.split(' ')[0]} today`;
      strip.appendChild(p);
    });
  }
  if (cal && cal.today && cal.today.length) {
    const p = document.createElement('span');
    p.className = 'mpill mp-mtg';
    p.textContent = `${cal.today.length} meeting${cal.today.length>1?'s':''}`;
    strip.appendChild(p);
  }
  if (cal && cal.focus_window) {
    const p = document.createElement('span');
    p.className = 'mpill mp-focus';
    p.textContent = `Focus ${cal.focus_window}`;
    strip.appendChild(p);
  }
  if (!STATE.briefing) {
    const p = document.createElement('span');
    p.className = 'mpill mp-gen';
    p.textContent = 'Tap Generate to start';
    strip.appendChild(p);
  }
}

// ═══════════════════════════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    STATE.tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTab();
  });
});

// ═══════════════════════════════════════════════════════════════
// RENDER TAB
// ═══════════════════════════════════════════════════════════════
function renderTab() {
  const content = document.getElementById('tab-content');
  content.innerHTML = '';
  if      (STATE.tab === 'today')    renderToday(content);
  else if (STATE.tab === 'podcasts') renderPodcasts(content);
  else if (STATE.tab === 'grow')     renderGrow(content);
  else if (STATE.tab === 'saved')    renderSaved(content);
}

// ═══════════════════════════════════════════════════════════════
// TODAY TAB
// ═══════════════════════════════════════════════════════════════
function renderToday(el) {
  const b = STATE.briefing;

  // Section: Calendar
  el.appendChild(secLabel('Calendar & Birthdays'));
  el.appendChild(renderCalCard(b ? b.calendar : null, b ? b.birthdays : null));

  // Section: Newsletters
  const activeNL = STATE.newsletters.filter(n => n.on);
  const nlLabel = secLabel('Newsletters');
  el.appendChild(nlLabel);

  if (!b) {
    const ph = document.createElement('div');
    ph.className = 'card';
    ph.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">
      Tap <strong style="color:var(--accent)">Generate</strong> to fetch today's briefing
    </div>`;
    el.appendChild(ph);
    return;
  }

  // Build set of IDs that have actual briefing or cached data
  const briefingIds = new Set((b.newsletters || []).map(n => n.id));
  const cachedNL = JSON.parse(localStorage.getItem('pig_os_cached_nl') || '{}');
  const hasData = (id) => briefingIds.has(id) || (cachedNL[id] && cachedNL[id].layer1);

  // Only show sources that have data (briefing or cached) — never empty placeholders
  let idx = 0;
  activeNL.forEach((nl) => {
    if (!hasData(nl.id)) return; // skip sources with no data at all
    const data = b.newsletters ? b.newsletters.find(n => n.id === nl.id) : null;
    const card = renderNewsletterCard(nl, data);
    card.style.animationDelay = `${idx * 40}ms`;
    el.appendChild(card);
    idx++;
  });

  // Also show any briefing newsletters not in config (auto-discovered sources)
  (b.newsletters || []).forEach(n => {
    if (!n.layer1) return;
    const inConfig = activeNL.some(nl => nl.id === n.id);
    if (inConfig) return;
    const card = renderNewsletterCard({ id: n.id, name: n.source_name || n.id }, n);
    card.style.animationDelay = `${idx * 40}ms`;
    el.appendChild(card);
    idx++;
  });

  nlLabel.textContent = `Newsletters · ${idx} sources`;
}

function secLabel(text) {
  const d = document.createElement('div');
  d.className = 'sec-lbl';
  d.textContent = text;
  return d;
}

// ── Calendar Card ──────────────────────────────────────────────
function renderCalCard(calData, birthdays) {
  const card = document.createElement('div');
  card.className = 'card card-enter';

  // Birthdays
  if (birthdays && birthdays.length) {
    birthdays.forEach(b => {
      const row = document.createElement('div');
      row.className = 'bday-banner';
      const initials = b.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      row.innerHTML = `
        <div class="bday-avatar">${initials}</div>
        <div class="bday-info">
          <div class="bday-name">${esc(b.name)}</div>
          <div class="bday-sub">${esc(b.note || `Turns ${b.age || '?'} today`)}</div>
        </div>`;
      card.appendChild(row);
    });
  }

// Podcast cache: { "PodcastName": { data: {...}, fetchedAt: timestamp } }
const PODCAST_CACHE_KEY = 'mos-podcast-cache';
const PODCAST_CACHE_TTL = 6 * 60 * 60 * 1000; // 6 hours

function getPodcastCache() {
  try { return JSON.parse(localStorage.getItem(PODCAST_CACHE_KEY) || '{}'); } catch { return {}; }
}
function setPodcastCache(cache) {
  try { localStorage.setItem(PODCAST_CACHE_KEY, JSON.stringify(cache)); } catch {}
}

function renderPodcasts(el) {
  const activePods = STATE.podcasts.filter(p => p.on);

  el.appendChild(secLabel(`Podcasts · ${activePods.length} tracked`));

  if (!activePods.length) {
    const ph = document.createElement('div');
    ph.className = 'card';
    ph.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">
      <div style="font-size:28px;margin-bottom:8px;opacity:.4">🎙</div>
      No podcasts selected.<br>
      <span style="font-size:11px;color:var(--text3)">Tap ⚙ to search and add shows</span>
    </div>`;
    el.appendChild(ph);
    return;
  }

  const cache = getPodcastCache();
  const now = Date.now();

  // Check if ALL podcasts are cached and fresh
  const allCached = activePods.every(pod => {
    const cached = cache[pod.name];
    return cached && cached.data && (now - cached.fetchedAt < PODCAST_CACHE_TTL);
  });

  if (allCached) {
    // Render all from cache immediately
    activePods.forEach((pod, i) => {
      const card = renderPodcastCard(cache[pod.name].data);
      card.style.animationDelay = `${i * 40}ms`;
      el.appendChild(card);
    });
    return;
  }

  // Show skeletons for all pods while we fetch from Notion
  const skeletonContainer = document.createElement('div');
  skeletonContainer.id = 'podcast-skeletons';
  activePods.forEach((pod, i) => {
    const cached = cache[pod.name];
    const isFresh = cached && cached.data && (now - cached.fetchedAt < PODCAST_CACHE_TTL);
    if (isFresh) {
      const card = renderPodcastCard(cached.data);
      card.style.animationDelay = `${i * 40}ms`;
      skeletonContainer.appendChild(card);
    } else {
      const sk = document.createElement('div');
      sk.className = 'card card-enter';
      sk.id = `pod-skeleton-${i}`;
      sk.dataset.podName = pod.name;
      sk.style.animationDelay = `${i * 40}ms`;
      sk.innerHTML = `<div style="padding:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="width:40px;height:40px;border-radius:10px;background:var(--bg3);animation:pulse 1.5s ease-in-out infinite"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(pod.name)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Loading from Notion…</div>
          </div>
        </div>
        <div style="height:10px;background:var(--bg3);border-radius:4px;width:90%;animation:pulse 1.5s ease-in-out infinite"></div>
        <div style="height:10px;background:var(--bg3);border-radius:4px;width:70%;margin-top:6px;animation:pulse 1.5s ease-in-out infinite"></div>
      </div>`;
      skeletonContainer.appendChild(sk);
    }
  });
  el.appendChild(skeletonContainer);

  // Step 1: Try podcast-read (Notion) → Step 2: Fallback to briefing.json → Step 3: Fallback to podcast-fetch
  fetchPodcastsFromNotion(activePods, cache);
}

async function fetchPodcastsFromNotion(activePods, cache) {
  const activeNames = new Set(activePods.map(p => p.name.toLowerCase()));

  try {
    // Step 1: Read from Notion via podcast-read
    const resp = await fetch('/.netlify/functions/podcast-read');
    if (resp.ok) {
      const { podcasts } = await resp.json();
      if (podcasts && podcasts.length) {
        const newCache = getPodcastCache();
        const now = Date.now();
        let matched = 0;
        podcasts.forEach(pod => {
          if (!pod || !pod.name) return;
          newCache[pod.name] = { data: pod, fetchedAt: now };
          matched++;
          replacePodcastSkeleton(pod);
        });
        setPodcastCache(newCache);
        if (matched > 0) {
          // Fill any remaining skeletons with podcast-fetch fallback
          fillRemainingSkeletons(activePods);
          return;
        }
      }
    }
  } catch (e) {
    console.warn('podcast-read failed:', e);
  }

  // Step 2: Fallback to briefing.json podcasts (already loaded in STATE)
  try {
    const briefingPods = STATE.briefing?.podcasts;
    if (briefingPods && briefingPods.length) {
      const newCache = getPodcastCache();
      const now = Date.now();
      briefingPods.forEach(pod => {
        if (!pod || !pod.name) return;
        newCache[pod.name] = { data: pod, fetchedAt: now };
        replacePodcastSkeleton(pod);
      });
      setPodcastCache(newCache);
      fillRemainingSkeletons(activePods);
      return;
    }
  } catch (e) {
    console.warn('briefing.json podcast fallback failed:', e);
  }

  // Step 3: Fallback to individual podcast-fetch calls
  fillRemainingSkeletons(activePods);
}

function replacePodcastSkeleton(podData) {
  // Find skeleton by pod name
  const container = document.getElementById('podcast-skeletons');
  if (!container) return;
  const skeletons = container.querySelectorAll('[data-pod-name]');
  for (const sk of skeletons) {
    if (sk.dataset.podName.toLowerCase() === (podData.name||'').toLowerCase()) {
      const card = renderPodcastCard(podData);
      sk.parentNode.replaceChild(card, sk);
      return;
    }
  }
  // No matching skeleton — might be a podcast not in active list but in Notion
}

function fillRemainingSkeletons(activePods) {
  const container = document.getElementById('podcast-skeletons');
  if (!container) return;
  const remaining = container.querySelectorAll('[data-pod-name]');
  remaining.forEach(sk => {
    const podName = sk.dataset.podName;
    // Try podcast-fetch as last resort
    fetch('/.netlify/functions/podcast-fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ podcast_name: podName }),
    })
      .then(r => {
        if (r.status === 429) throw new Error('RATE_LIMIT');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        const c = getPodcastCache();
        c[podName] = { data, fetchedAt: Date.now() };
        setPodcastCache(c);
        if (sk.parentNode) {
          const card = renderPodcastCard(data);
          sk.parentNode.replaceChild(card, sk);
        }
      })
      .catch(err => {
        console.error(`podcast-fetch failed for ${podName}:`, err);
        const isRateLimit = err.message === 'RATE_LIMIT';
        sk.innerHTML = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">${esc(podName)}</div>
          ${isRateLimit
            ? '<span style="color:var(--amber)">API credits exhausted.</span> Resets automatically — try again later.'
            : `Could not load episode. <button onclick="renderTab()" style="color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline">Retry</button>`}
        </div>`;
      });
  });
}

  pl2.querySelector('.act-thesis').addEventListener('click', (e) => {

    showToast('Saved ✓');

  pl2.querySelector('.act-deeper').addEventListener('click', () => {
    const ctx = isNewFormat ? l2 : (pod.digest||{});
    const prompt = `I want to explore this podcast digest more deeply:\n\n${pod.name}\n\n${summary}`;
    window.open(`https://claude.ai/new?q=${encodeURIComponent(prompt)}`, '_blank');
  });

  // Save recommendation buttons
  pl2.querySelectorAll('.pod-save-rec').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const name = e.currentTarget.dataset.name;
      const cat = e.currentTarget.dataset.cat;

      });
    }
  });

  return wrap;
}

// ── iTunes podcast search ─────────────────────────────────────
let itunesSearchTimeout = null;
let itunesResults = [];

async function searchITunes(query) {
  if (!query || query.length < 2) { renderPodcastSearchResults([]); return; }
  clearTimeout(itunesSearchTimeout);
  itunesSearchTimeout = setTimeout(async () => {
    try {
      // Use iTunes Search API — no key needed, returns podcast metadata
      const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=podcast&entity=podcast&limit=8&country=ae`;
      const resp = await fetch(url);
      if (!resp.ok) return;
      const data = await resp.json();
      itunesResults = data.results || [];
      renderPodcastSearchResults(itunesResults);
    } catch(e) {
      console.warn('iTunes search error:', e);
      const list = document.getElementById('podcast-directory-list');
      if (list) {
        const errDiv = list.querySelector('.itunes-error');
        if (!errDiv) {
          const el = document.createElement('div');
          el.className = 'itunes-error';
          el.style.cssText = 'font-size:11px;color:var(--text3);padding:8px 0;text-align:center';
          el.textContent = 'Search unavailable — try again';
          list.appendChild(el);
        }
      }
    }
  }, 350);
}

function renderPodcastSearchResults(results) {
  const list = document.getElementById('podcast-directory-list');
  if (!list) return;

  // Show active podcasts first
  const activePods = STATE.podcasts.filter(p => p.on);
  let html = '';

  if (activePods.length) {
    html += `<div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Tracking (${activePods.length})</div>`;
    activePods.forEach(pod => {
      const domainColors = { D1:'var(--accent2-bg);color:var(--accent2)', D2:'var(--accent-bg);color:var(--accent)', D3:'var(--blue-bg);color:var(--blue)', D4:'var(--amber-bg);color:var(--amber)' };
      const dc = domainColors[pod.domain || 'D1'] || domainColors.D1;
      html += `<div class="podcast-item" style="align-items:center">
        <button class="podcast-toggle on" data-remove="${esc(pod.id)}"></button>
        ${pod.artwork ? `<img src="${esc(pod.artwork)}" style="width:32px;height:32px;border-radius:6px;flex-shrink:0" loading="lazy">` : `<div style="width:32px;height:32px;border-radius:6px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3)">${esc((pod.name||'?')[0])}</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--text)">${esc(pod.name)}</div>
          ${pod.artist ? `<div style="font-size:10px;color:var(--text3)">${esc(pod.artist)}</div>` : ''}
        </div>
      </div>`;
    });
    if (results.length) html += '<div style="height:0.5px;background:var(--border);margin:8px 0"></div>';
  }

  if (results.length) {
    html += `<div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Search results</div>`;
    results.forEach(pod => {
      const alreadyAdded = STATE.podcasts.some(p => (p.itunesId === pod.collectionId || p.id === 'itunes_' + pod.collectionId) && p.on);
      const artwork = (pod.artworkUrl100 || '').replace('100x100', '60x60');
      html += `<div class="podcast-item" style="align-items:center;opacity:${alreadyAdded ? '0.5' : '1'}">
        <button class="podcast-toggle ${alreadyAdded ? 'on disabled' : ''}" data-add="${pod.collectionId}" data-name="${esc(pod.collectionName)}" data-artist="${esc(pod.artistName || '')}" data-artwork="${esc(artwork)}"></button>
        ${artwork ? `<img src="${esc(artwork)}" style="width:32px;height:32px;border-radius:6px;flex-shrink:0" loading="lazy">` : ''}
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--text)">${esc(pod.collectionName)}</div>
          <div style="font-size:10px;color:var(--text3)">${esc(pod.artistName || '')} · ${pod.trackCount || '?'} episodes</div>
        </div>
      </div>`;
    });
  } else if (!activePods.length) {
    html += '<div style="font-size:12px;color:var(--text3);padding:12px 0;text-align:center">Type to search for podcasts</div>';
  }

  list.innerHTML = html;

  // Wire up toggle buttons
  list.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('disabled')) return;
      const id = 'itunes_' + btn.dataset.add;
      if (!STATE.podcasts.find(p => p.id === id)) {
        STATE.podcasts.push({
          id,
          itunesId: parseInt(btn.dataset.add),
          name: btn.dataset.name,
          artist: btn.dataset.artist,
          artwork: btn.dataset.artwork,
          on: true,
          domain: 'D1',
        });
      }
      renderSettingsPodcasts();
    });
  });

  list.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.remove;
      const pod = STATE.podcasts.find(p => p.id === id);
      if (pod) pod.on = false;
      renderSettingsPodcasts();
    });
  });
}

function renderSettingsPodcasts() {

function filterPodcasts(query) {
  const list = document.getElementById('podcast-directory-list');
  if (!list) return;
  list.innerHTML = '';
  const q = query.toLowerCase();
  const filtered = PODCAST_DIRECTORY.filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)
  );
  if (!filtered.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px 0">No shows match</div>';
    return;
  }
  filtered.forEach(pod => {
    const isActive = STATE.podcasts.some(p => p.id === pod.id && p.on);
    const domainColors = { D1:'var(--accent2-bg);color:var(--accent2)', D2:'var(--accent-bg);color:var(--accent)', D3:'var(--blue-bg);color:var(--blue)', D4:'var(--amber-bg);color:var(--amber)' };
    const dc = domainColors[pod.domain] || domainColors.D1;
    const row = document.createElement('div');
    row.className = 'podcast-item';
    row.style.cssText = 'align-items:flex-start;gap:10px;padding:9px 0';
    row.innerHTML = `
      <button class="podcast-toggle ${isActive?'on':''}" style="margin-top:2px;flex-shrink:0"></button>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="font-size:12px;font-weight:600;color:var(--text)">${esc(pod.name)}</span>
          <span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:20px;background:${dc}">${pod.domain}</span>
        </div>
        <div style="font-size:11px;color:var(--text3)">${esc(pod.desc)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:1px">YouTube: ${esc(pod.channel)}</div>
      </div>`;
    row.querySelector('.podcast-toggle').addEventListener('click', (e) => {
      const active = e.currentTarget.classList.toggle('on');
      if (active) {
        if (!STATE.podcasts.find(p => p.id === pod.id)) {
          STATE.podcasts.push({ id: pod.id, name: pod.name, on: true });
        } else {
          STATE.podcasts.find(p => p.id === pod.id).on = true;
        }
      } else {
        const existing = STATE.podcasts.find(p => p.id === pod.id);
        if (existing) existing.on = false;
      }
    });
    list.appendChild(row);
  });
}

// ── Podcast config sync to repo via Netlify function ──────────
async function syncPodcastConfig() {
  // Collect active podcast IDs — both directory and iTunes-added ones
  const activeIds = STATE.podcasts.filter(p => p.on).map(p => p.id);
  if (!activeIds.length) return; // don't save empty config
  try {
    const resp = await fetch('/.netlify/functions/save-podcasts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active_podcasts: activeIds }),
    });
    if (resp.ok) {
      showToast('Podcast config saved to cloud');
    } else {
      const err = await resp.json().catch(() => ({}));
      console.warn('Podcast sync failed:', err.error || resp.status);
      showToast('Podcast config saved locally (cloud sync failed)');
    }
  } catch (e) {
    console.warn('Podcast sync error:', e);
    showToast('Podcast config saved locally');
  }
}

// ── Load config.json on startup to sync podcast selections ────
async function loadRemoteConfig() {
  try {
    const resp = await fetch('config.json?t=' + Date.now());
    if (!resp.ok) return;
    const cfg = await resp.json();
    if (!Array.isArray(cfg.active_podcasts) || !cfg.active_podcasts.length) return;

    // Merge remote config into STATE.podcasts
    const localPodIds = new Set(STATE.podcasts.map(p => p.id));
    for (const id of cfg.active_podcasts) {
      if (localPodIds.has(id)) {
        // Activate if already in local state
        const pod = STATE.podcasts.find(p => p.id === id);
        if (pod) pod.on = true;
      } else {
        // Check directory for known podcast
        const dirPod = PODCAST_DIRECTORY.find(p => p.id === id);
        if (dirPod) {
          STATE.podcasts.push({ id: dirPod.id, name: dirPod.name, on: true });
        } else {
          // Unknown podcast (e.g. itunes-added on another device)
          STATE.podcasts.push({ id, name: id, on: true });
        }
      }
    }
    save();
  } catch (e) { console.warn('Remote config load error:', e); }
}

document.getElementById('save-settings-btn').addEventListener('click', () => {
  save();
  syncPodcastConfig(); // async — fire and forget
  closeSettings();
  renderTab();
});

async function loadBriefing() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Loading…';
  try {
    const staticData = await fetchStaticBriefing();
    if (staticData && staticData._source === 'static') {
      STATE.briefing = staticData;
      mergeAndCacheNewsletters();
      save();
      renderTab();
      btn.textContent = 'Refresh';
      btn.disabled = false;
      if (staticData.generated_at) {
        const strip = document.getElementById('meta-strip');
        strip.innerHTML = '';
        const ts = document.createElement('span');
        ts.className = 'mpill';
        ts.textContent = 'Generated: ' + new Date(staticData.generated_at).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',timeZone:'Asia/Dubai'});
        strip.appendChild(ts);
      }
      return;
    }
  } catch(e) { console.warn('Static briefing load failed:', e); }
  btn.disabled = false;
  btn.textContent = 'Refresh';
  // Static fetch failed — but if we already have briefing data from localStorage, just use that
  if (STATE.briefing) {
    renderTab();
    return;
  }
  // Truly no data at all — show hint
  const content = document.getElementById('tab-content');
  let hint = document.getElementById('no-briefing-hint');
  if (!hint) {
    hint = document.createElement('div');
    hint.id = 'no-briefing-hint';

      <div style="font-size:28px;margin-bottom:8px;opacity:.5">&#x23F3;</div>

      <span style="color:var(--text3);font-size:12px">
        Go to your repo &rarr; Actions &rarr; "Morning OS — Daily Briefing" &rarr; Run workflow
      </span>`;
    content.prepend(hint);
  }
}

// UTILITIES
// ═══════════════════════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function todayStr() {
  return new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', timeZone:'Asia/Dubai' });
}
function dayOfWeek() {
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Dubai'}))
    .toLocaleDateString('en-US',{weekday:'long'});
}

const CHAT_STATE = {
  messages: [],
  systemPrompt: null,
  isLoading: false,
};

async function buildSystemPrompt() {
  if (CHAT_STATE.systemPrompt) return CHAT_STATE.systemPrompt;

  // Load user profile from knowledge file
  let userProfile = '';
  try {
    const res = await fetch('/knowledge/user-profile.md');
    if (res.ok) userProfile = await res.text();
  } catch {}

  // Load user model (D8 — evolving beliefs, patterns, challenges)
  let userModel = '';
  try {
    const umRes = await fetch('/knowledge/user-model.md');
    if (umRes.ok) userModel = await umRes.text();
  } catch {}

  // Load weekly report (D7 — last synthesis context)
  let weeklyReport = '';
  try {
    const wrRes = await fetch('/weekly-report.json');
    if (wrRes.ok) {
      const wr = await wrRes.json();
      weeklyReport = `
## Last Weekly Synthesis (${wr.week_of})
Dominant narrative: ${wr.dominant_narrative}
This week's conviction: ${wr.one_conviction}
Your 3 challenges: ${(wr.weekly_challenges || []).join(' | ')}
`.trim();
    }
  } catch {}

  // Summarize today's briefing as context
  const briefing = STATE.briefing;
  let briefingContext = '';
  if (briefing) {
    const newsletterSummaries = (briefing.newsletters || [])
      .filter(n => n.has_new_edition)
      .map(n => `- ${n.name || n.id}: ${n.layer1?.summary || ''}`)
      .join('\n');
    const calData = briefing.calendar;
    const calendarItems = calData && calData.today
      ? calData.today.map(e => `- ${e.title || 'Untitled'} at ${e.time || ''}`).join('\n')
      : '';
    const growthSummary = briefing.growth
      ? `Small talk hook: ${briefing.growth.small_talk_bridge?.topic_hook || 'N/A'}
Arabic word: ${briefing.growth.arabic?.word || 'N/A'} (${briefing.growth.arabic?.transliteration || ''})
Mini concept: ${briefing.growth.mini_concept?.concept_name || 'N/A'}`
      : '';
    briefingContext = `
## Today's Briefing Summary
Date: ${briefing.generated_at || new Date().toDateString()}

### Newsletters processed today:
${newsletterSummaries || 'None'}

### Calendar:
${calendarItems || 'No events'}

### Growth:
${growthSummary || 'Not generated'}
`.trim();
  }

  CHAT_STATE.systemPrompt = `You are a personal intelligence assistant for the user of Morning OS.

${userProfile}

${briefingContext}

${weeklyReport ? `${weeklyReport}\n` : ''}${userModel ? `## Your Evolving User Model\n${userModel}\n` : ''}
## Your Role
Answer questions about today's briefing, explain signals and stories in depth,
connect information to the user's specific domains (D1-D4), and provide sharp
analysis when asked. You have full context of today's briefing above.

When the user asks to "deep dive" on a topic, search your knowledge and provide
the most current and relevant analysis you can — go beyond what's in the briefing.

You know the user's current beliefs, open questions, and recent challenges from the user model.
Reference these when relevant — help the user think, not just consume.

Be direct. No filler. Every sentence must add value.`;

  return CHAT_STATE.systemPrompt;
}

function openIntelligenceChat(cardId, cardType) {
  const drawer = document.getElementById('intelligence-drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  drawer.classList.remove('closed');
  backdrop.classList.add('visible');
  setTimeout(() => document.getElementById('chat-input').focus(), 300);

  // Pre-fill contextual starter based on card type
  if (cardId || cardType) {
    let starter = '';
    if (cardType === 'newsletter') {
      const nl = (STATE.briefing?.newsletters || []).find(n => n.id === cardId);
      if (nl) starter = `Tell me more about the key signals from ${nl.name || nl.id} today. What are the deeper implications for my work and portfolio?`;
    } else if (cardType === 'podcast') {
      const pod = (STATE.briefing?.podcasts || []).find(p => p.id === cardId);
      if (pod) starter = `Deep dive on the main ideas from ${pod.name} — ${pod.episode || 'latest episode'}. What should I take away?`;
    } else if (cardType === 'grow') {
      starter = `Expand on today's growth content. Give me more depth on the small talk technique and mini concept.`;
    }
    if (starter) {
      document.getElementById('chat-input').value = starter;
    }
  }
}

function closeIntelligenceChat() {
  document.getElementById('intelligence-drawer').classList.add('closed');
  document.getElementById('drawer-backdrop').classList.remove('visible');
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

async function sendChatMessage() {
  if (CHAT_STATE.isLoading) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  CHAT_STATE.isLoading = true;
  document.getElementById('chat-send').disabled = true;

  appendChatMessage('user', text);
  CHAT_STATE.messages.push({ role: 'user', content: text });

  const thinkingEl = appendChatMessage('assistant thinking', '...');

  try {
    const systemPrompt = await buildSystemPrompt();

    const response = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        messages: CHAT_STATE.messages,
      }),
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();
    const reply = data.text || 'No response received.';

    thinkingEl.textContent = reply;
    thinkingEl.classList.remove('thinking');

    CHAT_STATE.messages.push({ role: 'assistant', content: reply });

  } catch (err) {
    thinkingEl.textContent = `Error: ${err.message}. Check that ANTHROPIC_API_KEY is set in Netlify.`;
    thinkingEl.classList.remove('thinking');
  } finally {
    CHAT_STATE.isLoading = false;
    document.getElementById('chat-send').disabled = false;
  }
}

function appendChatMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = `chat-msg ${role}`;
  el.textContent = text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}
