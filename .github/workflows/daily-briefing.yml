name: Morning OS — Daily Briefing
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install yt-dlp
        run: |
          sudo wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp
      - name: Fetch transcripts
        run: node scripts/fetch-transcripts.js
        env:
          ACTIVE_PODCASTS: ${{ vars.ACTIVE_PODCASTS }}
        continue-on-error: true
      - name: Generate briefing
        run: node scripts/generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ACTIVE_NEWSLETTERS: ${{ vars.ACTIVE_NEWSLETTERS }}
          ACTIVE_PODCASTS: ${{ vars.ACTIVE_PODCASTS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
          USER_PROFILE: ${{ secrets.USER_PROFILE }}
          USER_CITY: ${{ secrets.USER_CITY }}
          USER_TIMEZONE: ${{ secrets.USER_TIMEZONE }}
      - name: Commit and push briefing.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update briefing.json — $(date -u +%Y-%m-%d)"
          git push
