name: Deploy Morning OS App
on:
  push:
    branches: [main]
    paths: [index.html, briefing.json]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/index.html
          [ -f briefing.json ] && cp briefing.json _site/briefing.json || echo '{}' > _site/briefing.json
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
